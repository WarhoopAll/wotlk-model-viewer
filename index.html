<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoW Model Viewer — Demo</title>
    <link rel="icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
            integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
            crossorigin="anonymous"></script>
    <script src="vendor/viewer.min.js"></script>
    <style>
        :root {
            --bg: #0b0e1a;
            --bg-2: #131829;
            --panel: rgba(20, 26, 46, 0.72);
            --panel-solid: #141a2e;
            --border: rgba(120, 150, 220, 0.14);
            --border-strong: rgba(160, 190, 255, 0.3);
            --gold: #e6c667;
            --gold-dim: #b9975b;
            --accent: #4aa3ff;       /* mage class color */
            --text: #e8ecf6;
            --text-dim: #8a93ad;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            background:
                radial-gradient(1200px 800px at 20% -10%, #1c2545 0%, transparent 55%),
                radial-gradient(1000px 700px at 110% 120%, #241a3a 0%, transparent 50%),
                var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #app { display: flex; height: 100vh; }

        /* ---- Stage (3D viewport) ---- */
        .stage {
            flex: 1;
            min-width: 0;
            position: relative;
            overflow: hidden;
        }
        .stage::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(600px 600px at 50% 45%, rgba(74, 163, 255, 0.08), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        /* The engine sets position:relative + an explicit pixel height on this
           container and appends its <canvas> inside. We just make it fill the
           stage; the canvas is centered by the engine on the model bounds. */
        #model_3d { width: 100%; height: 100%; }
        #model_3d canvas { display: block; }

        .stage-badge {
            position: absolute;
            top: 20px; left: 22px;
            display: flex; align-items: center; gap: 10px;
            padding: 8px 14px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 999px;
            backdrop-filter: blur(10px);
            font-size: 12px;
            letter-spacing: .4px;
            color: var(--text-dim);
            z-index: 5;
        }
        .stage-badge b { color: var(--gold); font-weight: 600; }
        .stage-badge .dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #43d17a; box-shadow: 0 0 8px #43d17a;
        }

        .stage-hint {
            position: absolute;
            bottom: 18px; left: 50%; transform: translateX(-50%);
            font-size: 12px; color: var(--text-dim);
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 6px 14px; border-radius: 999px;
            backdrop-filter: blur(10px);
            z-index: 5;
            white-space: nowrap;
        }

        /* ---- Sidebar ---- */
        #info {
            width: 400px;
            flex-shrink: 0;
            padding: 26px 24px 32px;
            overflow-y: auto;
            background: linear-gradient(180deg, rgba(19, 24, 41, 0.96), rgba(11, 14, 26, 0.98));
            border-left: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        #info::-webkit-scrollbar { width: 8px; }
        #info::-webkit-scrollbar-thumb {
            background: rgba(120, 150, 220, 0.25);
            border-radius: 8px;
        }

        .char-header {
            display: flex; align-items: center; gap: 14px;
            padding-bottom: 18px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .char-portrait {
            width: 54px; height: 54px; flex-shrink: 0;
            border-radius: 12px;
            background: linear-gradient(135deg, #2a3556, #171d33);
            border: 1px solid var(--border-strong);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Cinzel', serif;
            font-size: 24px;
            color: var(--gold);
            box-shadow: inset 0 0 20px rgba(74, 163, 255, 0.15);
        }
        #info h1 {
            font-family: 'Cinzel', serif;
            font-size: 24px; font-weight: 700;
            line-height: 1.1;
            background: linear-gradient(90deg, #fff, var(--gold));
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #info .sub {
            color: var(--accent);
            margin-top: 3px;
            font-size: 13px; font-weight: 500;
            letter-spacing: .3px;
        }

        .section {
            display: flex; align-items: center; gap: 8px;
            font-family: 'Cinzel', serif;
            font-weight: 600;
            margin: 22px 0 12px;
            color: var(--gold);
            font-size: 13px;
            letter-spacing: .8px;
            text-transform: uppercase;
        }
        .section::after {
            content: ""; flex: 1; height: 1px;
            background: linear-gradient(90deg, var(--border-strong), transparent);
        }

        /* ---- Cards / tables ---- */
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        tr { transition: background .15s; }
        tr:not(:last-child) td { border-bottom: 1px solid rgba(120, 150, 220, 0.08); }
        tr:hover { background: rgba(74, 163, 255, 0.06); }
        td { padding: 9px 14px; vertical-align: middle; }
        td:first-child { color: var(--text-dim); }
        td:last-child { text-align: right; color: var(--text); font-weight: 500; }

        /* equipment rows */
        #equipment td:first-child { color: var(--text-dim); font-size: 12px; width: 36%; }
        #equipment td:last-child { line-height: 1.3; }
        .item-name.q4 { color: #a335ee; }  /* epic */

        /* ---- Animation controls ---- */
        .controls { display: flex; flex-direction: column; gap: 10px; }
        #animList {
            display: flex; flex-wrap: wrap; gap: 6px;
        }
        .btn {
            padding: 7px 13px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(20, 26, 46, 0.6);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 12.5px; font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all .15s;
        }
        .btn:hover {
            background: rgba(74, 163, 255, 0.14);
            border-color: var(--border-strong);
            transform: translateY(-1px);
        }
        .btn.active {
            background: linear-gradient(135deg, var(--accent), #2f7fd8);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 14px rgba(74, 163, 255, 0.35);
        }
        .play-row { display: flex; gap: 8px; align-items: center; }
        .btn-icon { font-size: 15px; line-height: 1; padding: 8px 12px; }

        /* ---- Loading overlay ---- */
        .loading {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 22px;
            background:
                radial-gradient(600px 400px at 50% 40%, #1a2544, transparent 70%),
                var(--bg);
            transition: opacity .5s ease;
        }
        .loading.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 64px; height: 64px;
            border-radius: 50%;
            border: 3px solid rgba(160, 190, 255, 0.15);
            border-top-color: var(--gold);
            border-right-color: var(--accent);
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-family: 'Cinzel', serif;
            font-size: 16px; letter-spacing: 1px;
            color: var(--text);
        }
        .loading-sub { font-size: 12px; color: var(--text-dim); margin-top: -12px; }

        /* ---- Responsive ---- */
        @media (max-width: 820px) {
            #app { flex-direction: column; }
            .stage { height: 55vh; }
            #info { width: 100%; height: 45vh; border-left: none; border-top: 1px solid var(--border); }
            .stage-hint { display: none; }
        }
    </style>
</head>
<body>
<div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Summoning character…</div>
    <div class="loading-sub">Loading models &amp; textures</div>
</div>

<div id="app">
    <div class="stage">
        <div class="stage-badge"><span class="dot"></span> WoW Model Viewer <b>v1.1.7</b></div>
        <div id="model_3d"></div>
        <div class="stage-hint">Drag to rotate · Scroll to zoom</div>
    </div>

    <div id="info">
        <div class="char-header">
            <div class="char-portrait" id="char-initial">M</div>
            <div>
                <h1 id="char-name">Mag</h1>
                <div class="sub" id="char-meta">Gnome Mage</div>
            </div>
        </div>

        <div class="section">Animation</div>
        <div class="controls">
            <div id="animList"></div>
            <div class="play-row">
                <button class="btn btn-icon active" id="btnPause" title="Play / Pause">⏸ Pause</button>
            </div>
        </div>

        <div class="section">Equipment</div>
        <div class="card"><table id="equipment"></table></div>

        <div class="section">Character</div>
        <div class="card"><table id="char-details"></table></div>
    </div>
</div>

<script type="module">
import { generateModels } from './demo-bundle.js'

window.CONTENT_PATH = 'https://sub.re3os.ru/data/'

const C = {
    name: 'Mag', race: 7, class: 8, gender: 0, level: 80,
    skin: 4, face: 1, hairStyle: 2, hairColor: 6, facialStyle: 7,
    inventory: [
        [1,64897],[3,63820],[20,64859],[6,109252],[7,64246],
        [8,63825],[9,63826],[10,63910],[21,63806]
    ]
}

const RACES = {1:'Human',2:'Orc',3:'Dwarf',4:'Night Elf',5:'Scourge',6:'Tauren',7:'Gnome',8:'Troll',10:'Blood Elf',11:'Draenei'}
const CLASSES = {1:'Warrior',2:'Paladin',3:'Hunter',4:'Rogue',5:'Priest',6:'Death Knight',7:'Shaman',8:'Mage',9:'Warlock',11:'Druid'}
const CLASS_COLORS = {1:'#c69b6d',2:'#f48cba',3:'#aad372',4:'#fff468',5:'#ffffff',6:'#c41e3a',7:'#0070dd',8:'#3fc7eb',9:'#8788ee',11:'#ff7c0a'}
const SLOTS = {1:'Head',3:'Shoulders',20:'Chest (Robe)',6:'Waist',7:'Legs',8:'Feet',9:'Wrists',10:'Hands',21:'Main Hand'}
const ITEM_NAMES = {
    64897:'Sanctified Bloodmage Hood',63820:'Shoulders of Mercy Killing',
    64859:'Sanctified Bloodmage Robe',109252:'Misbegotten Belt',
    64246:'Sanctified Bloodmage Leggings',63825:"Plague Scientist's Boots",
    63826:"The Lady's Brittle Bracers",63910:'Sanctified Bloodmage Gloves',
    63806:'Distant Land'
}
const GENDERS = {0:'Female', 1:'Male'}

// Apply class color as the accent theme.
const classColor = CLASS_COLORS[C.class] || '#4aa3ff'
document.documentElement.style.setProperty('--accent', classColor)

document.getElementById('char-name').textContent = C.name
document.getElementById('char-initial').textContent = C.name[0] || '?'
document.getElementById('char-meta').textContent =
    `Level ${C.level} · ${RACES[C.race]} ${CLASSES[C.class]}`

const eq = document.getElementById('equipment')
C.inventory.forEach(([slot, id]) => {
    eq.insertAdjacentHTML('beforeend',
        `<tr>
            <td>${SLOTS[slot] || 'Slot ' + slot}</td>
            <td><span class="item-name q4">${ITEM_NAMES[id] || id}</span></td>
        </tr>`)
})

const det = document.getElementById('char-details')
;[
    ['Race', RACES[C.race]], ['Class', CLASSES[C.class]], ['Gender', GENDERS[C.gender]],
    ['Level', C.level], ['Skin', C.skin], ['Face', C.face],
    ['Hair Style', C.hairStyle], ['Hair Color', C.hairColor], ['Facial Style', C.facialStyle]
].forEach(([l,v]) => det.insertAdjacentHTML('beforeend', `<tr><td>${l}</td><td>${v}</td></tr>`))

// Match the canvas aspect to the actual viewport so the engine's built-in
// framing (it centers on the model's bounding-box center) lines up with what
// we see. A hardcoded aspect of 1 made a square canvas on a landscape stage,
// which threw the centering off.
const stage = document.querySelector('.stage')
const aspect = Math.max(stage.clientWidth / stage.clientHeight, 0.1)

const model = await generateModels(aspect, '#model_3d', {
    race: C.race, gender: C.gender, skin: C.skin, face: C.face,
    hairStyle: C.hairStyle, hairColor: C.hairColor, facialStyle: C.facialStyle,
    items: C.inventory,
    hideProgressBar: true,
    onReady: () => {
        document.getElementById('loading').classList.add('hidden')
        // No manual setOffset: let the engine keep the model centered on its
        // own bounding box. setDistance only controls zoom, not centering.
        model.setDistance(18)
        initAnimControls()
    }
})

function initAnimControls() {
    const container = document.getElementById('animList')
    const FALLBACK = ['Stand','Walk','Run','Dance','Kiss','Sit','Sleep','Swim','Jump']

    const list = model.getListAnimations()
    const names = list.length ? list : FALLBACK
    const btnPause = document.getElementById('btnPause')
    let activeBtn = null
    let paused = false

    names.forEach(name => {
        const btn = document.createElement('button')
        btn.className = 'btn'
        btn.textContent = name
        btn.addEventListener('click', () => {
            const actor = model.renderer?.models?.[0]
            if (actor) {
                actor.setAnimation(name)
                if (actor.by) actor.by(true)
            }
            activeBtn?.classList.remove('active')
            btn.classList.add('active')
            activeBtn = btn
            // resume playback for the freshly selected animation
            paused = false
            model.setAnimPaused(false)
            btnPause.textContent = '⏸ Pause'
            btnPause.classList.add('active')
        })
        container.appendChild(btn)
    })

    btnPause.addEventListener('click', () => {
        paused = !paused
        model.setAnimPaused(paused)
        btnPause.textContent = paused ? '▶ Play' : '⏸ Pause'
        btnPause.classList.toggle('active', !paused)
    })
}
</script>
</body>
</html>
